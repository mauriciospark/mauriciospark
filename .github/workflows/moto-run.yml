name: 🏍️ Moto Commit Art Generator

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: 'Forçar regeneração completa da arte'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-moto-art:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 🏁 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🏍️ Configurar Git
      run: |
        git config user.name "mauriciospark"
        git config user.email "mauriciospark@users.noreply.github.com"
        git config --global advice.detachedHead false

    - name: 🎨 Gerar Arte da Pista de Moto
      run: |
        node <<'EOF'
        const fs = require('fs');
        const { execSync } = require('child_process');
        
        class MotoArtGenerator {
          constructor() {
            this.weeks = 52;
            this.days = 7;
            this.trackMatrix = [];
            this.today = new Date();
          }
          
          createTrackMatrix() {
            console.log('🏗️ Criando matriz da pista de corrida...');
            
            // Inicializa matriz vazia
            for (let day = 0; day < this.days; day++) {
              this.trackMatrix[day] = [];
              for (let week = 0; week < this.weeks; week++) {
                this.trackMatrix[day][week] = 0;
              }
            }
            
            // Desenha bordas da pista (linhas 1 e 5) - 2 commits cada
            for (let week = 0; week < this.weeks; week++) {
              this.trackMatrix[1][week] = 2; // Borda superior
              this.trackMatrix[5][week] = 2; // Borda inferior
            }
            
            // Desenha rastro da moto - padrão dinâmico cruzando a pista
            // A moto começa na esquerda e vai até a direita
            const motoPositions = [
              // Semana 0-3: Moto na esquerda
              { week: 0, day: 2, intensity: 15 },
              { week: 0, day: 3, intensity: 15 },
              { week: 0, day: 4, intensity: 15 },
              { week: 1, day: 2, intensity: 15 },
              { week: 1, day: 3, intensity: 15 },
              { week: 1, day: 4, intensity: 15 },
              { week: 2, day: 2, intensity: 15 },
              { week: 2, day: 3, intensity: 15 },
              { week: 2, day: 4, intensity: 15 },
              { week: 3, day: 2, intensity: 15 },
              { week: 3, day: 3, intensity: 15 },
              { week: 3, day: 4, intensity: 15 },
              
              // Semana 10-15: Moto no meio
              { week: 10, day: 1, intensity: 15 },
              { week: 10, day: 2, intensity: 15 },
              { week: 10, day: 3, intensity: 15 },
              { week: 10, day: 4, intensity: 15 },
              { week: 10, day: 5, intensity: 15 },
              { week: 11, day: 1, intensity: 15 },
              { week: 11, day: 2, intensity: 15 },
              { week: 11, day: 3, intensity: 15 },
              { week: 11, day: 4, intensity: 15 },
              { week: 11, day: 5, intensity: 15 },
              { week: 12, day: 1, intensity: 15 },
              { week: 12, day: 2, intensity: 15 },
              { week: 12, day: 3, intensity: 15 },
              { week: 12, day: 4, intensity: 15 },
              { week: 12, day: 5, intensity: 15 },
              { week: 13, day: 1, intensity: 15 },
              { week: 13, day: 2, intensity: 15 },
              { week: 13, day: 3, intensity: 15 },
              { week: 13, day: 4, intensity: 15 },
              { week: 13, day: 5, intensity: 15 },
              { week: 14, day: 1, intensity: 15 },
              { week: 14, day: 2, intensity: 15 },
              { week: 14, day: 3, intensity: 15 },
              { week: 14, day: 4, intensity: 15 },
              { week: 14, day: 5, intensity: 15 },
              { week: 15, day: 1, intensity: 15 },
              { week: 15, day: 2, intensity: 15 },
              { week: 15, day: 3, intensity: 15 },
              { week: 15, day: 4, intensity: 15 },
              { week: 15, day: 5, intensity: 15 },
              
              // Semana 25-30: Moto na direita
              { week: 25, day: 2, intensity: 15 },
              { week: 25, day: 3, intensity: 15 },
              { week: 25, day: 4, intensity: 15 },
              { week: 26, day: 2, intensity: 15 },
              { week: 26, day: 3, intensity: 15 },
              { week: 26, day: 4, intensity: 15 },
              { week: 27, day: 2, intensity: 15 },
              { week: 27, day: 3, intensity: 15 },
              { week: 27, day: 4, intensity: 15 },
              { week: 28, day: 2, intensity: 15 },
              { week: 28, day: 3, intensity: 15 },
              { week: 28, day: 4, intensity: 15 },
              { week: 29, day: 2, intensity: 15 },
              { week: 29, day: 3, intensity: 15 },
              { week: 29, day: 4, intensity: 15 },
              { week: 30, day: 2, intensity: 15 },
              { week: 30, day: 3, intensity: 15 },
              { week: 30, day: 4, intensity: 15 },
              
              // Semana 40-45: Moto cruzando novamente
              { week: 40, day: 1, intensity: 15 },
              { week: 40, day: 2, intensity: 15 },
              { week: 40, day: 3, intensity: 15 },
              { week: 40, day: 4, intensity: 15 },
              { week: 40, day: 5, intensity: 15 },
              { week: 41, day: 1, intensity: 15 },
              { week: 41, day: 2, intensity: 15 },
              { week: 41, day: 3, intensity: 15 },
              { week: 41, day: 4, intensity: 15 },
              { week: 41, day: 5, intensity: 15 },
              { week: 42, day: 1, intensity: 15 },
              { week: 42, day: 2, intensity: 15 },
              { week: 42, day: 3, intensity: 15 },
              { week: 42, day: 4, intensity: 15 },
              { week: 42, day: 5, intensity: 15 },
              { week: 43, day: 1, intensity: 15 },
              { week: 43, day: 2, intensity: 15 },
              { week: 43, day: 3, intensity: 15 },
              { week: 43, day: 4, intensity: 15 },
              { week: 43, day: 5, intensity: 15 },
              { week: 44, day: 1, intensity: 15 },
              { week: 44, day: 2, intensity: 15 },
              { week: 44, day: 3, intensity: 15 },
              { week: 44, day: 4, intensity: 15 },
              { week: 44, day: 5, intensity: 15 },
              { week: 45, day: 1, intensity: 15 },
              { week: 45, day: 2, intensity: 15 },
              { week: 45, day: 3, intensity: 15 },
              { week: 45, day: 4, intensity: 15 },
              { week: 45, day: 5, intensity: 15 }
            ];
            
            // Aplica posições da moto
            motoPositions.forEach(pos => {
              if (pos.week < this.weeks && pos.day < this.days) {
                this.trackMatrix[pos.day][pos.week] = pos.intensity;
              }
            });
            
            // Adiciona alguns pontos intermitentes (pontos de ultrapassagem)
            for (let week = 5; week < this.weeks; week += 8) {
              this.trackMatrix[3][week] = 1;
            }
            
            console.log('✅ Matriz da pista criada!');
            this.printTrackMatrix();
          }
          
          printTrackMatrix() {
            console.log('\n🏍️ Visualização da Pista de Corrida:');
            console.log('   0123456789012345678901234567890123456789012345678901234');
            const dayNames = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            
            for (let day = 0; day < this.days; day++) {
              let line = `${dayNames[day]} `;
              for (let week = 0; week < this.weeks; week++) {
                const value = this.trackMatrix[day][week];
                if (value === 0) line += ' ';
                else if (value === 1) line += '·';
                else if (value === 2) line += '═';
                else if (value === 15) line += '█';
                else line += '?';
              }
              console.log(line);
            }
            console.log('\nLegenda: ═ = Borda (2 commits), · = Ponto (1 commit), █ = Moto (15 commits)');
          }
          
          calculateDate(dayIndex, weekIndex) {
            const daysBack = (weekIndex * 7) + (6 - dayIndex);
            const targetDate = new Date(this.today);
            targetDate.setDate(this.today.getDate() - daysBack);
            targetDate.setHours(12, 0, 0, 0);
            return targetDate;
          }
          
          formatDateForGit(date) {
            return date.toISOString().replace('T', ' ').replace(/\.\d{3}Z$/, '');
          }
          
          createCommits() {
            console.log('🚀 Criando commits para a pista de corrida...');
            
            let totalCommits = 0;
            
            for (let day = 0; day < this.days; day++) {
              for (let week = 0; week < this.weeks; week++) {
                const intensity = this.trackMatrix[day][week];
                if (intensity > 0) {
                  const targetDate = this.calculateDate(day, week);
                  const dateStr = this.formatDateForGit(targetDate);
                  
                  for (let i = 0; i < intensity; i++) {
                    const fileName = `art_${day}_${week}_commit_${i}.md`;
                    const content = `# 🏍️ Moto Art Commit
                    
**Posição:** Dia ${day}, Semana ${week}
**Intensidade:** ${intensity} commits
**Data:** ${dateStr}
**Parte:** ${this.getTrackPart(day, week)}

---

Gerado por Moto-Commit-Art Workflow
`;
                    
                    fs.writeFileSync(fileName, content);
                    
                    try {
                      execSync('git add .', { stdio: 'pipe' });
                      
                      const commitMsg = `🏍️ Moto Art [${day},${week}] - Commit ${i+1}/${intensity}`;
                      const env = { 
                        GIT_COMMITTER_DATE: dateStr,
                        GIT_AUTHOR_DATE: dateStr
                      };
                      
                      execSync(`git commit -m "${commitMsg}"`, { 
                        env: { ...process.env, ...env },
                        stdio: 'pipe'
                      });
                      
                      fs.unlinkSync(fileName);
                      totalCommits++;
                    } catch (error) {
                      console.error(`Erro no commit [${day},${week}]:`, error.message);
                    }
                  }
                }
              }
            }
            
            console.log(`✅ ${totalCommits} commits criados!`);
            return totalCommits;
          }
          
          getTrackPart(day, week) {
            if (this.trackMatrix[day][week] === 15) return '🏍️ Moto';
            if (day === 1 || day === 5) return '═ Borda';
            if (this.trackMatrix[day][week] === 1) return '· Ponto';
            return 'Espaço';
          }
          
          run() {
            console.log('🏍️ Iniciando gerador de arte...');
            this.createTrackMatrix();
            return this.createCommits();
          }
        }
        
        const generator = new MotoArtGenerator();
        generator.run();
        EOF

    - name: 📊 Verificar Commits Criados
      run: |
        echo "📈 Total de commits criados:"
        git log --oneline | wc -l
        echo ""
        echo "🕐 Últimos 10 commits:"
        git log --oneline -10

    - name: 🚀 Push para o Repositório
      run: |
        git push origin main
        echo "✅ Arte da moto enviada com sucesso!"

    - name: 🎉 Resumo da Execução
      run: |
        echo "🏍️ Moto Commit Art Generator - Concluído!"
        echo "📊 Verifique seu perfil GitHub em alguns minutos para ver a arte!"
        echo "🔗 A arte aparecerá no gráfico de contribuições do seu perfil."
