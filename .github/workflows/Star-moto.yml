name: Star Moto Racing

on:
  # Roda automaticamente a cada 24 horas
  schedule:
    - cron: "0 */24 * * *" 
  
  # Permite que você rode manualmente na aba "Actions"
  workflow_dispatch:
  
  # Roda sempre que você fizer um push na branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Gera a animação da "corrida" baseada nos seus commits
      # color_snake: Cor da moto (#FF8C00 = Laranja)
      # color_dots: Cores da pista (do cinza claro ao preto/asfalto)
      - name: generate-snake-game-from-github-contribution-grid
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/moto-race.svg?color_snake=#FF8C00&color_dots=#ebedf0,#999999,#666666,#333333,#000000
            dist/moto-race-dark.svg?palette=github-dark&color_snake=#FF8C00

      # Envia a imagem gerada para a branch 'output'
      - name: push moto-race.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
